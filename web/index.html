<style>
:root {
  --bg-deep: #131316;
  --bg-surface: #1a1a1f;
  --bg-elevated: #212127;
  --bg-subtle: #28282f;
  --border: #2e2e38;
  --border-subtle: #383842;
  --text: #ededeb;
  --text-secondary: #a0a0ab;
  --text-muted: #6b6b78;
  --accent: #7c5cbf;
  --accent-light: #9b7de0;
  --accent-glow: rgba(124, 92, 191, 0.2);
  --success: #2d6a4f;
  --success-text: #95d5b2;
  --error: #d94f5e;
  --error-text: #f0a0a8;
  --warn-text: #e0b060;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-deep); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
::selection { background: var(--accent); color: #fff; }

header {
  padding: 14px 24px;
  background: #d8d8dc;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px;
}
header .logo {
  display: flex; align-items: center; gap: 10px;
}
header h1 {
  font-size: 17px; font-weight: 600; color: #1a1a1f;
  letter-spacing: 0.04em;
}
header .mark-wrap {
  position: relative;
  width: 28px; height: 28px;
  border-radius: 6px;
  overflow: hidden;
}
header .mark {
  width: 28px; height: 28px;
  display: block;
  filter: grayscale(1) contrast(1.2) brightness(0.9);
}
header .mark-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  animation: logo-shimmer 6s ease-in-out infinite;
  mix-blend-mode: color;
  pointer-events: none;
}
@keyframes logo-shimmer {
  0%   { background: rgba(124, 92, 191, 0.5); }
  33%  { background: rgba(90, 120, 220, 0.55); }
  66%  { background: rgba(150, 80, 180, 0.5); }
  100% { background: rgba(124, 92, 191, 0.5); }
}
header .subtitle {
  font-size: 12px; color: #606068;
  letter-spacing: 0.02em;
}
.actions { margin-left: auto; display: flex; gap: 8px; }

button {
  padding: 7px 18px;
  border-radius: 6px;
  border: 1px solid #505060;
  background: #38384a;
  color: #e0e0e8;
  cursor: pointer; font-size: 12px; font-weight: 500;
  font-family: var(--sans);
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}
button:hover {
  background: #48485a;
  color: #fff;
  border-color: #6a6a7a;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
button:active { transform: scale(0.98); }
button.primary {
  background: var(--accent);
  border-color: var(--accent-light);
  color: #f0e8e9;
}
button.primary:hover:not(:disabled) {
  background: var(--accent-light);
  box-shadow: 0 0 20px var(--accent-glow);
}
button.ai {
  background: var(--bg-elevated);
  border-color: var(--accent);
  color: var(--accent-light);
}
button.ai:hover:not(:disabled) {
  background: var(--accent);
  color: #f0e8e9;
  box-shadow: 0 0 20px var(--accent-glow);
}
.gh-link {
  display: flex; align-items: center;
  color: var(--text-secondary);
  transition: color 0.2s;
}
.gh-link:hover { color: var(--text); }

.panels { flex: 1; display: flex; overflow: hidden; }
.panel { flex: 1; display: flex; flex-direction: column; }
.panel + .panel { border-left: 1px solid var(--border); }
.panel-header {
  padding: 10px 20px;
  background: var(--bg-surface);
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--border);
}
.panel-header .tab {
  cursor: pointer; padding: 3px 10px; border-radius: 4px;
  transition: all 0.15s;
}
.panel-header .tab.active {
  background: var(--bg-subtle);
  color: var(--text-secondary);
}
.panel-header .tab:hover:not(.active) { color: var(--text-secondary); }

.editor-wrap { flex: 1; position: relative; overflow: hidden; }
.editor-highlight, .editor-wrap textarea {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  padding: 20px;
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  border: none; resize: none; tab-size: 2;
  white-space: pre-wrap; word-wrap: break-word; overflow: auto; margin: 0;
}
.editor-highlight {
  background: var(--bg-deep); color: var(--text);
  pointer-events: none; z-index: 0;
}
.editor-wrap textarea {
  background: transparent; color: transparent;
  caret-color: var(--accent-light);
  outline: none; z-index: 1;
  -webkit-text-fill-color: transparent;
}

.output-area {
  flex: 1; padding: 20px;
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  border: none; resize: none; tab-size: 2;
  background: var(--bg-deep); color: var(--text-secondary);
  overflow: auto; white-space: pre-wrap; word-break: break-word;
}
.editor-highlight span { font-family: inherit !important; font-size: inherit !important; line-height: inherit !important; }
.output-area.error { color: var(--error-text); }
.output-area.success { color: var(--success-text); }

.status {
  padding: 5px 24px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
  display: flex; justify-content: space-between;
  letter-spacing: 0.02em;
}

.ai-bar {
  display: flex; gap: 8px; padding: 10px 24px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  align-items: center;
}
.ai-bar select, .ai-bar input {
  padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep); color: var(--text-secondary);
  font-size: 12px; font-family: var(--sans); outline: none;
  transition: border-color 0.2s;
}
.ai-bar select:focus, .ai-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow);
}
.ai-bar input[type="password"] { width: 180px; }
.ai-bar input[type="text"] { flex: 1; }
.ai-bar label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

.ai-streaming { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Repair log */
.repair-log { font-family: var(--mono); font-size: 12px; line-height: 1.5; }
.repair-log .log-step {
  margin-bottom: 10px; padding: 10px 14px;
  border-radius: 6px;
  border-left: 2px solid var(--border-subtle);
  background: var(--bg-elevated);
}
.repair-log .log-step.log-error { border-left-color: var(--error); }
.repair-log .log-step.log-fix { border-left-color: var(--warn-text); }
.repair-log .log-step.log-ok { border-left-color: var(--success); }
.repair-log .log-step.log-fail { border-left-color: var(--error); background: #1e1418; }
.repair-log .log-label { font-weight: 500; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.03em; }
.repair-log .log-error .log-label { color: var(--error-text); }
.repair-log .log-fix .log-label { color: var(--warn-text); }
.repair-log .log-ok .log-label { color: var(--success-text); }
.repair-log .log-fail .log-label { color: var(--error-text); }
.repair-log .log-detail {
  color: var(--text-muted); white-space: pre-wrap; word-break: break-word;
  max-height: 120px; overflow-y: auto; font-size: 11px;
  margin-top: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #333340; }

/* --- Responsive --- */
@media (max-width: 768px) {
  body { height: auto; min-height: 100vh; }

  header {
    padding: 10px 14px;
    flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-size: 15px; }
  header .subtitle { font-size: 11px; }
  .actions { gap: 6px; }
  .actions button { padding: 6px 12px; font-size: 11px; }

  .panels {
    flex-direction: column;
    flex: none;
    height: auto;
  }
  .panel {
    flex: none;
    min-height: 0;
  }
  .panel + .panel {
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .panel:first-child {
    height: 45vh;
  }
  .panel:last-child {
    height: 40vh;
  }

  .editor-highlight, .editor-wrap textarea {
    padding: 12px;
    font-size: 16px;
  }
  .output-area {
    padding: 12px;
    font-size: 14px;
  }

  .ai-bar {
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 6px;
  }
  .ai-bar select { flex: 0 0 auto; font-size: 16px; }
  .ai-bar input[type="password"] { width: 100%; flex: 1 1 100%; font-size: 16px; }
  .ai-bar input[type="text"] { flex: 1 1 100%; min-width: 0; font-size: 16px; }
  .ai-bar label { font-size: 10px; }
  .ai-bar button { flex: 0 0 auto; }

  .status {
    padding: 5px 12px;
    font-size: 10px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .panel-header { padding: 8px 12px; font-size: 10px; }
}
</style>

    <textarea id="editor" spellcheck="false">// A tiny Markdown-to-text renderer

type Token =
  | Heading(Int, String)
  | Paragraph(String)
  | Bullet(String)
  | Divider

fn parse_line(line: String) -> Token =
  if string.starts_with?(line, "### ") then Heading(3, string.slice(line, 4))
  else if string.starts_with?(line, "## ") then Heading(2, string.slice(line, 3))
  else if string.starts_with?(line, "# ") then Heading(1, string.slice(line, 2))
  else if string.starts_with?(line, "- ") then Bullet(string.slice(line, 2))
  else if string.starts_with?(line, "---") then Divider
  else Paragraph(line)

fn render(token: Token) -> String =
  match token {
    Heading(1, text) => string.to_upper(text) ++ "\n" ++ string.repeat("=", string.len(text))
    Heading(_, text) => text ++ "\n" ++ string.repeat("-", string.len(text))
    Paragraph(text) => "  " ++ text
    Bullet(text) => "  * " ++ text
    Divider => string.repeat("~", 40)
  }

fn fibonacci(n: Int) -> List[Int] = {
  var a = 0
  var b = 1
  var result: List[Int] = []
  for _ in 0..n {
    result = result ++ [a]
    let next = a + b
    a = b
    b = next
  }
  result
}

effect fn main(_args: List[String]) -> Result[Unit, String] = {
  let doc = [
    "# Almide",
    "## A language that compiles to Rust and TypeScript",
    "---",
    "- Variant types with pattern matching",
    "- Pipes, lambdas, and string interpolation",
    "- Effect system for side effects",
    "- Compiles to native and web",
    "---",
    "## Fibonacci",
  ]

  doc
    |> list.map(fn(line) => parse_line(line))
    |> list.map(fn(tok) => render(tok))
    |> list.each(fn(s) => println(s))

  let fibs = fibonacci(10)
  let visual = fibs
    |> list.map(fn(n) => "[${int.to_string(n)}]")
    |> string.join(" ")
  println("  ${visual}")

  let sum = list.fold(fibs, 0, fn(acc, x) => acc + x)
  println("  sum = ${int.to_string(sum)}")

  // Heredoc + string interpolation
  let lang = "Almide"
  let target1 = "Rust"
  let target2 = "TypeScript"
  let report = """
    ${lang} compiles to:
      1. ${target1} (native)
      2. ${target2} (web)
    Total targets: ${int.to_string(2)}
  """
  println("")
  println(report)
}</textarea>

<script type="module">
import init, { compile_to_js, compile_to_ts, parse_to_ast } from './pkg/almide_playground.js';

let wasmReady = false;

const MODELS = {
  anthropic: [
    { value: 'claude-sonnet-4-20250514', label: 'Claude Sonnet' },
    { value: 'claude-haiku-4-5-20251001', label: 'Claude Haiku' },
  ],
  openai: [
    { value: 'gpt-4o', label: 'GPT-4o' },
    { value: 'gpt-4o-mini', label: 'GPT-4o mini' },
  ],
  gemini: [
    { value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
    { value: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash' },
  ],
};

function populateModels(provider) {
  const sel = document.getElementById('ai-model');
  sel.innerHTML = '';
  for (const m of MODELS[provider]) {
    const opt = document.createElement('option');
    opt.value = m.value;
    opt.textContent = m.label;
    sel.appendChild(opt);
  }
  const savedModel = localStorage.getItem('almide-ai-model-' + provider);
  if (savedModel) sel.value = savedModel;
}

window.onProviderChange = function() {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-ai-provider', provider);
  populateModels(provider);
  const saved = localStorage.getItem('almide-api-key-' + provider);
  document.getElementById('ai-key').value = saved || '';
  const placeholders = { anthropic: 'sk-ant-...', openai: 'sk-...', gemini: 'AIza...' };
  document.getElementById('ai-key').placeholder = placeholders[provider] || 'API Key';
};

async function boot() {
  try {
    await init();
    wasmReady = true;
    document.getElementById('status-text').textContent = 'Your API key is never sent to external servers.';
  } catch(e) {
    document.getElementById('status-text').textContent = 'Wasm load failed: ' + e;
  }
  const savedProvider = localStorage.getItem('almide-ai-provider') || 'anthropic';
  document.getElementById('ai-provider').value = savedProvider;
  onProviderChange();
}

document.getElementById('ai-key').addEventListener('change', (e) => {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-api-key-' + provider, e.target.value);
});
document.getElementById('ai-model').addEventListener('change', (e) => {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-ai-model-' + provider, e.target.value);
});

document.getElementById('ai-prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    generateCode();
  }
});

const ALMIDE_SYSTEM = `You are an Almide (.almd) code generator. Output ONLY valid .almd source code. Do NOT wrap in markdown code fences. No explanations.

## Syntax

Types:      Int String Bool Unit Float List[T] Map[K,V] Option[T] Result[T,E]
Fn:         fn name(x: Type) -> RetType = expr
Effect:     effect fn name(x: Type) -> Result[T, E] = expr
If:         if cond then a else b                  (* else is MANDATORY *)
Match:      match x { some(v) => v, none => "" }
For:        for x in xs { ... }
            for (i, x) in list.enumerate(xs) { ... }
Range:      0..5 = [0,1,2,3,4]   1..=5 = [1,2,3,4,5]
Do loop:    do { guard cond else ok(()) ... }      (* dynamic break only *)
Guard:      guard cond else err(msg)               (* early exit *)
Lambda:     fn(x) => expr
Concat:     "a" ++ "b"   [1] ++ [2]               (* ++ for string AND list *)
XOR:        a ^ b
Interp:     "hello \${name}"
Heredoc:    """\\n  multi-line \${expr}\\n"""
Raw str:    r"\\d+"                                 (* no escape processing *)
Let/Var:    let x = 1    var y = 2    y = 3
Tuple:      (1, "a")
Pipe:       xs |> list.filter(fn(x) => x > 0)
Variant:    type Color = | Red | Blue | Custom(Int, Int, Int)
Record:     type User = { name: String, age: Int }
Operators:  + - * / % ^ == != < > <= >= ++ and or not |>

## Stdlib (auto-imported)

string: trim split join len lines chars pad_left pad_right slice contains
  starts_with? ends_with? to_upper to_lower replace replace_first to_int to_float
  char_at index_of last_index_of repeat from_bytes to_bytes reverse
  is_empty? is_digit? is_alpha? is_alphanumeric? is_whitespace?
  strip_prefix strip_suffix count

list: len get get_or first last sort sort_by reverse contains index_of
  any all each map flat_map filter find fold enumerate zip flatten
  take drop chunk unique join sum product min max is_empty?
  filter_map take_while drop_while count partition reduce group_by

map: new get get_or set contains remove merge keys values len
  entries from_list is_empty? map_values filter from_entries

int: to_string to_hex band bor bxor bshl bshr bnot clamp
     wrap_add wrap_mul rotate_right rotate_left to_u32 to_u8

float: to_string to_int from_int round floor ceil abs sqrt parse min max clamp

fs (effect): read_text write read_lines append mkdir_p exists? is_dir?
  is_file? remove list_dir copy rename

path: join dirname basename extension is_absolute?

env (effect): unix_timestamp millis args get set cwd sleep_ms

process (effect): exec exec_status exit stdin_lines

io (effect): read_line print read_all

## Import-required modules

import json   — parse stringify get get_string get_int get_bool get_array
                keys to_string to_int from_string from_int from_bool
                null array from_map get_float from_float stringify_pretty
import math   — min max abs pow pi e sin cos tan log exp sqrt
import random — int float choice shuffle
import time   — now millis sleep year month day hour minute second
                weekday to_iso from_parts
import regex  — match? full_match? find find_all replace replace_first
                split captures
import encoding — hex_encode hex_decode base64_encode base64_decode
import args   — flag? option option_or positional

## Built-in functions (no prefix)

println(s) eprintln(s) assert_eq(a,b) assert_ne(a,b) assert(cond) unwrap_or(opt,default)

## Rules
- if ALWAYS requires else — no standalone if
- for...in for iteration (preferred over do+guard)
- ++ for string/list concat, ^ for XOR, not for boolean negation
- effect fn for side effects, Result[T,E] for errors, Option[T] for nullable
- All stdlib calls need module prefix: list.map(xs, f), NOT map(xs, f)
- println only takes String. Use int.to_string(n) or float.to_string(n)
- Empty list = [], empty map = map.new()
- _ is ONLY for match wildcard and for _ in loop, never as variable name
- Heredoc: """....""" with \${expr} interpolation, strips common indent
- Raw string: r"..." — no escape processing (for regex patterns etc.)
- UFCS: f(x, y) = x.f(y) — compiler resolves automatically

## Common mistakes — DO NOT
- list[1,2,3] → WRONG. Write [1,2,3]
- each(xs,f) → WRONG. Write list.each(xs,f)
- map[K,V] as value → WRONG. Write map.new()
- println(42) → WRONG. Write println(int.to_string(42))
- fn foo[T](x: T) → WRONG. No user-defined generics. Use concrete types
- List.new() → WRONG. Write []. No new() for List
- if x then y (no else) → WRONG. else is mandatory

## Note: This runs in a browser playground
- fs, process, io, env.args are NOT available (will throw errors)
- Keep examples focused on pure computation, string/list/math operations
- Use println for output

## Example
type Color = | Red | Green | Blue | Custom(Int, Int, Int)

fn describe(c: Color) -> String =
  match c {
    Red => "red"
    Green => "green"
    Blue => "blue"
    Custom(r, g, b) => "rgb(\${int.to_string(r)},\${int.to_string(g)},\${int.to_string(b)})"
  }

fn fibonacci(n: Int) -> List[Int] = {
  var a = 0
  var b = 1
  var result: List[Int] = []
  for _ in 0..n {
    result = result ++ [a]
    let next = a + b
    a = b
    b = next
  }
  result
}

effect fn main(_args: List[String]) -> Result[Unit, String] = {
  let fibs = fibonacci(10)
  let visual = fibs
    |> list.map(fn(n) => int.to_string(n))
    |> string.join(", ")
  println("Fibonacci: \${visual}")

  let colors = [Red, Green, Custom(255, 128, 0)]
  for c in colors {
    println(describe(c))
  }
}`;

function stripCodeFences(text) {
  return text.replace(/^```[\w]*\n?/, '').replace(/\n?```\s*$/, '').trim();
}

let abortController = null;

// --- Provider-specific streaming ---

async function streamAnthropic(apiKey, model, messages, signal, onText) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model, max_tokens: 4096, system: ALMIDE_SYSTEM, stream: true,
      messages,
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.type === 'content_block_delta' && evt.delta && evt.delta.text) {
      onText(evt.delta.text);
    }
  });
}

async function streamOpenAI(apiKey, model, messages, signal, onText) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model, max_tokens: 4096, stream: true,
      messages: [
        { role: 'system', content: ALMIDE_SYSTEM },
        ...messages,
      ],
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.choices && evt.choices[0] && evt.choices[0].delta && evt.choices[0].delta.content) {
      onText(evt.choices[0].delta.content);
    }
  });
}

async function streamGemini(apiKey, model, messages, signal, onText) {
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':streamGenerateContent?key=' + apiKey + '&alt=sse';
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }],
  }));
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: ALMIDE_SYSTEM }] },
      contents,
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.candidates && evt.candidates[0] && evt.candidates[0].content) {
      const parts = evt.candidates[0].content.parts;
      if (parts) for (const p of parts) { if (p.text) onText(p.text); }
    }
  });
}

async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try { onEvent(JSON.parse(data)); } catch(e) { /* skip */ }
    }
  }
}

const MAX_REPAIR_ATTEMPTS = 3;

function tryCompileAndRun(source) {
  let js;
  try {
    js = compile_to_js(source);
  } catch(e) {
    return { ok: false, error: String(e), phase: 'compile' };
  }
  try {
    const output = captureOutput(js);
    return { ok: true, js, output };
  } catch(e) {
    return { ok: false, error: String(e), js, phase: 'runtime' };
  }
}

window.generateCode = async function() {
  const provider = document.getElementById('ai-provider').value;
  const apiKey = document.getElementById('ai-key').value.trim();
  if (!apiKey) { alert('Please enter your API key'); return; }
  const promptEl = document.getElementById('ai-prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) { alert('Please describe what to generate'); return; }
  promptEl.value = '';
  const model = document.getElementById('ai-model').value;
  const btn = document.getElementById('ai-btn');
  const editor = document.getElementById('editor');
  const statusText = document.getElementById('status-text');

  if (abortController) {
    abortController.abort();
    abortController = null;
    btn.textContent = 'Generate';
    statusText.textContent = 'Cancelled';
    return;
  }

  abortController = new AbortController();
  btn.textContent = 'Stop';
  editor.value = '';
  editor.classList.add('ai-streaming');
  statusText.textContent = 'Generating...';

  const streamFn = { anthropic: streamAnthropic, openai: streamOpenAI, gemini: streamGemini }[provider];
  const messages = [{ role: 'user', content: prompt }];

  const outputEl = document.getElementById('output');
  const compiledEl = document.getElementById('compiled');
  let repairLog = [];

  function renderLog() {
    outputEl.className = 'output-area';
    outputEl.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'repair-log';
    for (const entry of repairLog) {
      const step = document.createElement('div');
      step.className = 'log-step ' + entry.cls;
      const label = document.createElement('div');
      label.className = 'log-label';
      label.textContent = entry.label;
      step.appendChild(label);
      if (entry.detail) {
        const detail = document.createElement('div');
        detail.className = 'log-detail';
        detail.textContent = entry.detail;
        step.appendChild(detail);
      }
      container.appendChild(step);
    }
    outputEl.appendChild(container);
    outputEl.scrollTop = outputEl.scrollHeight;
    showTab('output');
  }

  try {
    await streamFn(apiKey, model, messages, abortController.signal, (text) => {
      editor.value += text;
      editor.scrollTop = editor.scrollHeight;
      syncHighlight();
    });
    editor.value = stripCodeFences(editor.value);
    syncHighlight();

    if (!wasmReady) {
      statusText.textContent = 'Generated (Wasm not loaded)';
      return;
    }

    let code = editor.value;
    let result = tryCompileAndRun(code);
    let totalFixes = 0;

    if (result.ok) {
      repairLog.push({ cls: 'log-ok', label: 'Compile & run OK' });
    } else {
      const phase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
      repairLog.push({ cls: 'log-error', label: phase + ' detected', detail: result.error });
    }
    renderLog();

    while (!result.ok && totalFixes < MAX_REPAIR_ATTEMPTS) {
      totalFixes++;
      const phase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
      statusText.textContent = 'Repairing (' + totalFixes + '/' + MAX_REPAIR_ATTEMPTS + ')...';

      repairLog.push({ cls: 'log-fix', label: 'Repair ' + totalFixes + '/' + MAX_REPAIR_ATTEMPTS + ' \u2014 fixing ' + phase.toLowerCase() });
      renderLog();

      messages.push({ role: 'assistant', content: code });
      messages.push({ role: 'user', content:
        phase + ':\n' + result.error + '\n\nFix the code and output ONLY the corrected .almd source. No explanations.'
      });

      editor.value = '';
      await streamFn(apiKey, model, messages, abortController.signal, (text) => {
        editor.value += text;
        editor.scrollTop = editor.scrollHeight;
        syncHighlight();
      });
      editor.value = stripCodeFences(editor.value);
      syncHighlight();
      code = editor.value;

      result = tryCompileAndRun(code);

      if (result.ok) {
        repairLog.push({ cls: 'log-ok', label: 'Fixed \u2014 compile & run OK' });
      } else {
        const newPhase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
        const prevError = repairLog.filter(e => e.cls === 'log-error').pop();
        const same = prevError && result.error === prevError.detail;
        repairLog.push({
          cls: 'log-error',
          label: same ? 'Same error persists' : 'New ' + newPhase.toLowerCase(),
          detail: result.error,
        });
      }
      renderLog();
    }

    if (result.ok) {
      compiledEl.textContent = result.js;
      compiledEl.className = 'output-area';
      if (result.output) {
        repairLog.push({ cls: 'log-ok', label: 'Output', detail: result.output });
        renderLog();
      }
      statusText.textContent = totalFixes > 0
        ? 'Repaired (' + totalFixes + ') & running'
        : 'Running';
    } else {
      repairLog.push({ cls: 'log-fail', label: 'Failed after ' + MAX_REPAIR_ATTEMPTS + ' attempts', detail: result.error });
      renderLog();
      statusText.textContent = 'Failed';
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      statusText.textContent = 'Error: ' + e.message;
    }
  } finally {
    abortController = null;
    btn.textContent = 'Generate';
    editor.classList.remove('ai-streaming');
  }
};

// --- Compiler / Runner ---

// Patch compiler's Node.js runtime for browser execution.
// Instead of maintaining a separate polyfill set, we reuse the compiler's
// runtime as-is and only replace the parts that use Node.js APIs.
function patchRuntimeForBrowser(js) {
  let code = js;
  // Replace Node.js module blocks with browser-safe stubs
  const browserOverrides = {
    '__almd_fs': '{ exists(p){throw new Error("fs: not available in browser")}, read_text(p){throw new Error("fs: not available in browser")}, read_bytes(p){throw new Error("fs: not available in browser")}, write(p,s){throw new Error("fs: not available in browser")}, write_bytes(p,b){throw new Error("fs: not available in browser")}, append(p,s){throw new Error("fs: not available in browser")}, mkdir_p(p){throw new Error("fs: not available in browser")}, exists_hdlm_qm_(p){throw new Error("fs: not available in browser")}, read_lines(p){throw new Error("fs: not available in browser")}, remove(p){throw new Error("fs: not available in browser")}, list_dir(p){throw new Error("fs: not available in browser")} }',
    '__almd_env': '{ unix_timestamp(){return Math.floor(Date.now()/1000)}, args(){return["playground"]}, get(name){return null}, set(name,value){}, cwd(){return "/"}, millis(){return Date.now()}, sleep_ms(ms){} }',
    '__almd_process': '{ exec(cmd,args){throw new Error("process: not available in browser")}, exit(code){throw new Error("process: not available in browser")}, stdin_lines(){throw new Error("process: not available in browser")} }',
    '__almd_io': '{ read_line(){throw new Error("io: not available in browser")}, print(s){}, read_all(){throw new Error("io: not available in browser")} }',
    '__almd_http': '{ async serve(){throw new Error("http: not available in browser")}, response(s,b){return{status:s,body:b,headers:{}}}, json(s,b){return{status:s,body:b,headers:{}}}, with_headers(s,b,h){return{status:s,body:b,headers:h}}, async get(u){throw new Error("http: not available in browser")}, async post(u,b){throw new Error("http: not available in browser")} }',
  };
  for (const [mod, stub] of Object.entries(browserOverrides)) {
    const prefix = 'const ' + mod + ' = ';
    const start = code.indexOf(prefix);
    if (start === -1) continue;
    // Find the end of the object literal (matching };)
    const objStart = start + prefix.length;
    let depth = 0, i = objStart;
    while (i < code.length) {
      if (code[i] === '{') depth++;
      else if (code[i] === '}') { depth--; if (depth === 0) break; }
      else if (code[i] === '"' || code[i] === "'") {
        const q = code[i]; i++;
        while (i < code.length && code[i] !== q) { if (code[i] === '\\') i++; i++; }
      }
      i++;
    }
    code = code.substring(0, objStart) + stub + code.substring(i + 1);
  }
  // Replace println/eprintln with output capture
  code = code.replace(
    /function println\(s\)\s*\{[^}]*\}/,
    'function println(s) { __println__(s); }'
  );
  code = code.replace(
    /function eprintln\(s\)\s*\{[^}]*\}/,
    'function eprintln(s) { __println__(s); }'
  );
  // Strip the entry point (we'll add our own)
  const entryPoint = code.indexOf('// ---- Entry Point ----');
  if (entryPoint !== -1) code = code.substring(0, entryPoint);
  return code;
}

function captureOutput(js) {
  const lines = [];
  const fakePrintln = (s) => lines.push(String(s));
  const patched = patchRuntimeForBrowser(js);
  const wrappedCode = patched + '\nif (typeof main === "function") { main(["playground"]); }';
  try {
    const fn = new Function('__println__', wrappedCode);
    fn(fakePrintln);
  } catch(e) {
    lines.push('[Runtime Error] ' + e.message);
  }
  return lines.join('\n');
}

window.compileCode = function() {
  if (!wasmReady) { alert('Wasm not loaded yet'); return; }
  const source = document.getElementById('editor').value;
  const start = performance.now();
  try {
    const js = compile_to_js(source);
    const elapsed = (performance.now() - start).toFixed(1);
    document.getElementById('compiled').textContent = js;
    document.getElementById('compiled').className = 'output-area';
    showTab('compiled');
    document.getElementById('status-text').textContent = 'Compiled in ' + elapsed + 'ms';
  } catch(e) {
    document.getElementById('compiled').textContent = String(e);
    document.getElementById('compiled').className = 'output-area error';
    showTab('compiled');
    document.getElementById('status-text').textContent = 'Compilation failed';
  }
};

window.runCode = function() {
  if (!wasmReady) { alert('Wasm not loaded yet'); return; }
  const source = document.getElementById('editor').value;
  const start = performance.now();
  try {
    const js = compile_to_js(source);
    document.getElementById('compiled').textContent = js;
    document.getElementById('compiled').className = 'output-area';
    const output = captureOutput(js);
    const elapsed = (performance.now() - start).toFixed(1);
    document.getElementById('output').textContent = output || '(no output)';
    document.getElementById('output').className = 'output-area success';
    showTab('output');
    document.getElementById('status-text').textContent = 'Ran in ' + elapsed + 'ms';
  } catch(e) {
    document.getElementById('output').textContent = String(e);
    document.getElementById('output').className = 'output-area error';
    showTab('output');
    document.getElementById('status-text').textContent = 'Error';
  }
};

window.showTab = function(name) {
  ['output', 'compiled', 'ast'].forEach(t => {
    document.getElementById(t).style.display = t === name ? 'block' : 'none';
    document.getElementById('tab-' + t).className = t === name ? 'tab active' : 'tab';
  });
  if (name === 'ast' && wasmReady) {
    const source = document.getElementById('editor').value;
    try {
      const ast = parse_to_ast(source);
      document.getElementById('ast').textContent = ast;
      document.getElementById('ast').className = 'output-area';
    } catch(e) {
      document.getElementById('ast').textContent = String(e);
      document.getElementById('ast').className = 'output-area error';
    }
  }
};

// --- Syntax Highlighting ---

let shikiHighlighter = null;

const HL_KEYWORDS = new Set([
  'import','type','fn','let','var','if','then','else','match',
  'effect','do','guard','ok','err','some','none','try','strict','pub',
  'deriving','test','async','await','newtype','for','in','trait','impl','unsafe',
  'and','or','not','local','mod','module','return','todo','extern',
]);
const HL_BOOLS = new Set(['true','false']);
const HL_BUILTINS = new Set(['println','eprintln','assert','assert_eq','assert_ne','unwrap_or']);
const HL_MODULES = new Set(['string','list','map','int','float','fs','env','process','io','json','math','random','regex','time','path','encoding','args']);

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightFallback(code) {
  let out = '', i = 0;
  const len = code.length;
  while (i < len) {
    if (code[i] === '(' && code[i+1] === '*') {
      let j = i + 2, depth = 1;
      while (j < len && depth > 0) {
        if (code[j] === '(' && code[j+1] === '*') { depth++; j += 2; }
        else if (code[j] === '*' && code[j+1] === ')') { depth--; j += 2; }
        else j++;
      }
      out += '<span style="color:#565f89;font-style:italic">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if (code[i] === '/' && code[i+1] === '/') {
      let end = code.indexOf('\n', i); if (end === -1) end = len;
      out += '<span style="color:#565f89;font-style:italic">' + escapeHtml(code.slice(i, end)) + '</span>';
      i = end; continue;
    }
    if (code[i] === 'r' && code[i+1] === '"') {
      // Raw string: r"..." — no interpolation, no escape processing
      let j = i + 2;
      while (j < len && code[j] !== '"') j++;
      if (j < len) j++;
      out += '<span style="color:#9ece6a">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if (code[i] === '"') {
      // Regular string with ${...} interpolation support
      let j = i + 1;
      out += '<span style="color:#9ece6a">&quot;</span>';
      while (j < len && code[j] !== '"') {
        if (code[j] === '\\' && j+1 < len) {
          out += '<span style="color:#9ece6a">' + escapeHtml(code[j] + code[j+1]) + '</span>';
          j += 2;
        } else if (code[j] === '$' && code[j+1] === '{') {
          out += '<span style="color:#7dcfff">${</span>';
          j += 2;
          let depth = 1;
          let expr = '';
          while (j < len && depth > 0) {
            if (code[j] === '{') depth++;
            else if (code[j] === '}') { depth--; if (depth === 0) break; }
            expr += code[j]; j++;
          }
          out += '<span style="color:#c0caf5">' + escapeHtml(expr) + '</span>';
          if (j < len && code[j] === '}') { out += '<span style="color:#7dcfff">}</span>'; j++; }
        } else {
          out += '<span style="color:#9ece6a">' + escapeHtml(code[j]) + '</span>';
          j++;
        }
      }
      if (j < len) { out += '<span style="color:#9ece6a">&quot;</span>'; j++; }
      i = j; continue;
    }
    if (code[i] >= '0' && code[i] <= '9') {
      let j = i;
      while (j < len && ((code[j] >= '0' && code[j] <= '9') || code[j] === '.')) j++;
      out += '<span style="color:#ff9e64">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if (code[i] >= 'A' && code[i] <= 'Z') {
      let j = i;
      while (j < len && /[a-zA-Z0-9_]/.test(code[j])) j++;
      out += '<span style="color:#2ac3de">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if ((code[i] >= 'a' && code[i] <= 'z') || code[i] === '_') {
      let j = i;
      while (j < len && /[a-zA-Z0-9_]/.test(code[j])) j++;
      if (j < len && code[j] === '?') j++;
      const w = code.slice(i, j);
      if (HL_KEYWORDS.has(w)) out += '<span style="color:#bb9af7;font-weight:500">' + escapeHtml(w) + '</span>';
      else if (HL_BOOLS.has(w)) out += '<span style="color:#ff9e64">' + escapeHtml(w) + '</span>';
      else if (HL_BUILTINS.has(w) || HL_MODULES.has(w)) out += '<span style="color:#7aa2f7">' + escapeHtml(w) + '</span>';
      else {
        let k = j; while (k < len && code[k] === ' ') k++;
        if (code[k] === '(') out += '<span style="color:#7dcfff">' + escapeHtml(w) + '</span>';
        else out += '<span style="color:#c0caf5">' + escapeHtml(w) + '</span>';
      }
      i = j; continue;
    }
    if (i+1 < len) {
      const two = code[i] + code[i+1];
      if (['->','=>','|>','==','!=','<=','>=','++','..'].includes(two)) {
        out += '<span style="color:#89ddff">' + escapeHtml(two) + '</span>';
        i += 2; continue;
      }
    }
    out += '<span style="color:#89ddff">' + escapeHtml(code[i]) + '</span>'; i++;
  }
  if (!code.endsWith('\n')) out += '\n';
  return out;
}

async function initShiki() {
  try {
    const { createHighlighterCore } = await import('https://esm.sh/shiki@3.2.1/core');
    const { createJavaScriptRegexEngine } = await import('https://esm.sh/shiki@3.2.1/engine/javascript');
    const grammarResp = await fetch('https://raw.githubusercontent.com/almide/almide-editors/main/grammar/almide.tmLanguage.json');
    const grammar = await grammarResp.json();
    grammar.name = 'almide';
    shikiHighlighter = await createHighlighterCore({
      themes: [import('https://esm.sh/shiki@3.2.1/themes/tokyo-night.mjs')],
      langs: [grammar],
      engine: createJavaScriptRegexEngine(),
    });
    syncHighlight();
  } catch(e) {
    console.warn('Shiki init failed, using fallback:', e);
  }
}

function syncHighlight() {
  const editor = document.getElementById('editor');
  const hl = document.getElementById('highlight');
  const code = editor.value;
  if (shikiHighlighter) {
    try {
      const html = shikiHighlighter.codeToHtml(code || ' ', { lang: 'almide', theme: 'tokyo-night' });
      const match = html.match(/<pre[^>]*><code[^>]*>([\s\S]*)<\/code><\/pre>/);
      hl.innerHTML = match ? match[1] : highlightFallback(code);
    } catch(e) {
      hl.innerHTML = highlightFallback(code);
    }
  } else {
    hl.innerHTML = highlightFallback(code);
  }
}

function syncScroll() {
  const editor = document.getElementById('editor');
  const hl = document.getElementById('highlight');
  hl.scrollTop = editor.scrollTop;
  hl.scrollLeft = editor.scrollLeft;
}

const editor = document.getElementById('editor');
editor.addEventListener('input', syncHighlight);
editor.addEventListener('scroll', syncScroll);
syncHighlight();

initShiki();
boot();
