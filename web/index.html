<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almide Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #08080a;
  --bg-surface: #0e0e12;
  --bg-elevated: #141418;
  --bg-subtle: #1a1a20;
  --border: #1e1e26;
  --border-subtle: #28282f;
  --text: #e8e6e3;
  --text-secondary: #8a8a95;
  --text-muted: #555560;
  --accent: #8b1a2b;
  --accent-light: #b8263a;
  --accent-glow: rgba(139, 26, 43, 0.15);
  --success: #2d6a4f;
  --success-text: #95d5b2;
  --error: #9b2226;
  --error-text: #e5989b;
  --warn-text: #dda15e;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg-deep); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
::selection { background: var(--accent); color: #fff; }

header {
  padding: 14px 24px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px;
}
header .logo {
  display: flex; align-items: center; gap: 10px;
}
header h1 {
  font-size: 17px; font-weight: 600; color: var(--text);
  letter-spacing: 0.04em;
}
header .mark {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, #3a3a40, #1a1a1e);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: var(--accent-light);
}
header .subtitle {
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 0.02em;
}
.actions { margin-left: auto; display: flex; gap: 8px; }

button {
  padding: 7px 18px;
  border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  cursor: pointer; font-size: 12px; font-weight: 500;
  font-family: var(--sans);
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}
button:hover {
  background: var(--bg-subtle);
  color: var(--text);
  border-color: #333340;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
button:active { transform: scale(0.98); }
button.primary {
  background: var(--accent);
  border-color: var(--accent-light);
  color: #f0e8e9;
}
button.primary:hover:not(:disabled) {
  background: var(--accent-light);
  box-shadow: 0 0 20px var(--accent-glow);
}
button.ai {
  background: var(--bg-elevated);
  border-color: var(--accent);
  color: var(--accent-light);
}
button.ai:hover:not(:disabled) {
  background: var(--accent);
  color: #f0e8e9;
  box-shadow: 0 0 20px var(--accent-glow);
}

.panels { flex: 1; display: flex; overflow: hidden; }
.panel { flex: 1; display: flex; flex-direction: column; }
.panel + .panel { border-left: 1px solid var(--border); }
.panel-header {
  padding: 10px 20px;
  background: var(--bg-surface);
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--border);
}
.panel-header .tab {
  cursor: pointer; padding: 3px 10px; border-radius: 4px;
  transition: all 0.15s;
}
.panel-header .tab.active {
  background: var(--bg-subtle);
  color: var(--text-secondary);
}
.panel-header .tab:hover:not(.active) { color: var(--text-secondary); }

.editor-wrap { flex: 1; position: relative; overflow: hidden; }
.editor-highlight, .editor-wrap textarea {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  padding: 20px;
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  border: none; resize: none; tab-size: 2;
  white-space: pre-wrap; word-wrap: break-word; overflow: auto; margin: 0;
}
.editor-highlight {
  background: var(--bg-deep); color: var(--text);
  pointer-events: none; z-index: 0;
}
.editor-wrap textarea {
  background: transparent; color: transparent;
  caret-color: var(--accent-light);
  outline: none; z-index: 1;
  -webkit-text-fill-color: transparent;
}

.output-area {
  flex: 1; padding: 20px;
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  border: none; resize: none; tab-size: 2;
  background: var(--bg-deep); color: var(--text-secondary);
  overflow: auto; white-space: pre-wrap; word-break: break-word;
}
.editor-highlight span { font-family: inherit !important; font-size: inherit !important; line-height: inherit !important; }
.output-area.error { color: var(--error-text); }
.output-area.success { color: var(--success-text); }

.status {
  padding: 5px 24px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
  display: flex; justify-content: space-between;
  letter-spacing: 0.02em;
}

.ai-bar {
  display: flex; gap: 8px; padding: 10px 24px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  align-items: center;
}
.ai-bar select, .ai-bar input {
  padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-deep); color: var(--text-secondary);
  font-size: 12px; font-family: var(--sans); outline: none;
  transition: border-color 0.2s;
}
.ai-bar select:focus, .ai-bar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow);
}
.ai-bar input[type="password"] { width: 180px; }
.ai-bar input[type="text"] { flex: 1; }
.ai-bar label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

.ai-streaming { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Repair log */
.repair-log { font-family: var(--mono); font-size: 12px; line-height: 1.5; }
.repair-log .log-step {
  margin-bottom: 10px; padding: 10px 14px;
  border-radius: 6px;
  border-left: 2px solid var(--border-subtle);
  background: var(--bg-elevated);
}
.repair-log .log-step.log-error { border-left-color: var(--error); }
.repair-log .log-step.log-fix { border-left-color: var(--warn-text); }
.repair-log .log-step.log-ok { border-left-color: var(--success); }
.repair-log .log-step.log-fail { border-left-color: var(--error); background: #120a0a; }
.repair-log .log-label { font-weight: 500; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.03em; }
.repair-log .log-error .log-label { color: var(--error-text); }
.repair-log .log-fix .log-label { color: var(--warn-text); }
.repair-log .log-ok .log-label { color: var(--success-text); }
.repair-log .log-fail .log-label { color: var(--error-text); }
.repair-log .log-detail {
  color: var(--text-muted); white-space: pre-wrap; word-break: break-word;
  max-height: 120px; overflow-y: auto; font-size: 11px;
  margin-top: 4px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #333340; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="mark">A</div>
    <h1>Almide</h1>
  </div>
  <span class="subtitle">Playground</span>
  <div class="actions">
    <button onclick="compileCode()">Compile</button>
    <button class="primary" onclick="runCode()">Run</button>
  </div>
</header>

<div class="panels">
  <div class="panel">
    <div class="panel-header">Source</div>
    <div class="editor-wrap">
    <pre class="editor-highlight" id="highlight" aria-hidden="true"></pre>
    <textarea id="editor" spellcheck="false">module app

fn fizzbuzz(n: Int) -> String =
  if n % 15 == 0 then "FizzBuzz"
  else if n % 3 == 0 then "Fizz"
  else if n % 5 == 0 then "Buzz"
  else int.to_string(n)

effect fn main(args: List[String]) -> Result[Unit, String] = {
  var i = 1
  do {
    guard i <= 20 else ok(())
    println(fizzbuzz(i))
    i = i + 1
  }
}</textarea>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="tab active" id="tab-output" onclick="showTab('output')">Output</span>
      <span class="tab" id="tab-compiled" onclick="showTab('compiled')">Compiled</span>
      <span class="tab" id="tab-ast" onclick="showTab('ast')">AST</span>
    </div>
    <div class="output-area" id="output">Press Run to execute.</div>
    <div class="output-area" id="compiled" style="display:none"></div>
    <div class="output-area" id="ast" style="display:none"></div>
  </div>
</div>

<div class="ai-bar">
  <select id="ai-provider" onchange="onProviderChange()">
    <option value="anthropic">Anthropic</option>
    <option value="openai">OpenAI</option>
    <option value="gemini">Gemini</option>
  </select>
  <input type="password" id="ai-key" placeholder="API Key" />
  <select id="ai-model"></select>
  <input type="text" id="ai-prompt" placeholder="Describe what to generate..." />
  <button class="ai" id="ai-btn" onclick="generateCode()">Generate</button>
</div>

<div class="status">
  <span id="status-text">Ready</span>
  <span>Almide Playground</span>
</div>

<script type="module">
import init, { compile_to_js, compile_to_ts, parse_to_ast } from './pkg/almide_playground.js';

let wasmReady = false;

const MODELS = {
  anthropic: [
    { value: 'claude-sonnet-4-20250514', label: 'Claude Sonnet' },
    { value: 'claude-haiku-4-5-20251001', label: 'Claude Haiku' },
  ],
  openai: [
    { value: 'gpt-4o', label: 'GPT-4o' },
    { value: 'gpt-4o-mini', label: 'GPT-4o mini' },
  ],
  gemini: [
    { value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
    { value: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash' },
  ],
};

function populateModels(provider) {
  const sel = document.getElementById('ai-model');
  sel.innerHTML = '';
  for (const m of MODELS[provider]) {
    const opt = document.createElement('option');
    opt.value = m.value;
    opt.textContent = m.label;
    sel.appendChild(opt);
  }
  const savedModel = localStorage.getItem('almide-ai-model-' + provider);
  if (savedModel) sel.value = savedModel;
}

window.onProviderChange = function() {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-ai-provider', provider);
  populateModels(provider);
  const saved = localStorage.getItem('almide-api-key-' + provider);
  document.getElementById('ai-key').value = saved || '';
  const placeholders = { anthropic: 'sk-ant-...', openai: 'sk-...', gemini: 'AIza...' };
  document.getElementById('ai-key').placeholder = placeholders[provider] || 'API Key';
};

async function boot() {
  try {
    await init();
    wasmReady = true;
    document.getElementById('status-text').textContent = 'Ready';
  } catch(e) {
    document.getElementById('status-text').textContent = 'Wasm load failed: ' + e;
  }
  const savedProvider = localStorage.getItem('almide-ai-provider') || 'anthropic';
  document.getElementById('ai-provider').value = savedProvider;
  onProviderChange();
}

document.getElementById('ai-key').addEventListener('change', (e) => {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-api-key-' + provider, e.target.value);
});
document.getElementById('ai-model').addEventListener('change', (e) => {
  const provider = document.getElementById('ai-provider').value;
  localStorage.setItem('almide-ai-model-' + provider, e.target.value);
});

document.getElementById('ai-prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    generateCode();
  }
});

const ALMIDE_SYSTEM = "You are an Almide (.almd) code generator. Output ONLY valid .almd source code. Do NOT wrap in markdown code fences. No explanations.\n\n## Grammar (EBNF)\nprogram     = \"module\" IDENT import* decl*\nimport      = \"import\" IDENT\ndecl        = type_decl | fn_decl\ntype_decl   = \"type\" IDENT \"=\" \"|\" variant (\"|\" variant)* \"deriving\" \"From\"\nvariant     = IDENT \"(\" type (\",\" type)* \")\"\nfn_decl     = [\"effect\"] \"fn\" IDENT \"(\" params \")\" \"->\" type \"=\" expr\ntype        = \"Int\" | \"String\" | \"Bool\" | \"Unit\" | IDENT | IDENT \"[\" type (\",\" type)* \"]\"\nexpr        = block | if_expr | match_expr | do_expr | guard | let | var | assign | binary | call | literal\nblock       = \"{\" stmt* expr \"}\"\nif_expr     = \"if\" expr \"then\" expr \"else\" expr\nmatch_expr  = \"match\" expr \"{\" arm (\",\" arm)* \"}\"\narm         = pattern \"=>\" expr\npattern     = \"some\" \"(\" pattern \")\" | \"none\" | \"ok\" \"(\" pattern \")\" | \"err\" \"(\" pattern \")\" | IDENT | LITERAL | \"_\"\ndo_expr     = \"do\" \"{\" (guard | stmt)* \"}\"\nguard       = \"guard\" expr \"else\" expr\nlet         = \"let\" IDENT \"=\" expr\nvar         = \"var\" IDENT \"=\" expr\nassign      = IDENT \"=\" expr\nbinary      = expr OP expr    (* OP: + - * / % ^ == != < > <= >= ++ and or *)\ncall        = IDENT \"(\" args \")\" | IDENT \".\" IDENT \"(\" args \")\"\nlambda      = \"fn\" \"(\" params \")\" \"=>\" expr\nliteral     = INT | STRING | \"true\" | \"false\" | \"ok\" \"(\" expr \")\" | \"err\" \"(\" expr \")\"\n\n## Stdlib (auto-imported)\nstring.trim(s) split(s,d) join(xs,d) len(s) pad_left(s,w,c) slice(s,start) to_bytes(s) contains(s,sub) starts_with?(s,p) ends_with?(s,p) replace(s,from,to) to_upper(s) to_lower(s) to_int(s) char_at(s,i)\nlist.get(xs,i)->Option len(xs) sort(xs) contains(xs,v) map(xs,f) filter(xs,f) fold(xs,init,f) each(xs,f) find(xs,f)\nint.to_string(n) int.to_hex(n)\nenv.unix_timestamp()\nprintln(s)\n\n## Only fs needs import:\nimport fs\nfs.read_text(path) fs.write(path,s) fs.mkdir_p(path) fs.exists?(path) fs.append(path,s)\n\n## Rules\n- No while/return/class/null/! — use for...in or do+guard for loops, guard for early exit\n- if always requires else\n- ++ for string/list concat, ^ for XOR, \"not\" for boolean negation\n- effect fn for side-effecting functions\n- String interpolation: \"hello ${name}\"\n- Always start with: module <name>\n- List literal: [1, 2, 3] — NOT list[1, 2, 3]. `list` is a module, not a constructor\n- All stdlib calls need module prefix: list.each(xs, f), NOT each(xs, f)\n- println only takes String. Use int.to_string(n) to print numbers\n- for x in xs { ... } for iterating lists (preferred over do+guard)\n\n## Common mistakes — DO NOT write these:\n- list[1,2,3] → WRONG. Write [1,2,3]\n- each(xs,f) → WRONG. Write list.each(xs,f)\n- map[K,V] as value → WRONG. Write map.new()\n- println(42) → WRONG. Write println(int.to_string(42))\n- 1 :: 2 :: [] → WRONG. Write [1, 2]. No cons operator\n- fn foo[T](x: T) → WRONG. No user-defined generics. Use concrete types\n\n## Example\nmodule app\n\nfn fizzbuzz(n: Int) -> String =\n  if n % 15 == 0 then \"FizzBuzz\"\n  else if n % 3 == 0 then \"Fizz\"\n  else if n % 5 == 0 then \"Buzz\"\n  else int.to_string(n)\n\neffect fn main(args: List[String]) -> Result[Unit, String] = {\n  var i = 1\n  do {\n    guard i <= 100 else ok(())\n    println(fizzbuzz(i))\n    i = i + 1\n  }\n}";

function stripCodeFences(text) {
  return text.replace(/^```[\w]*\n?/, '').replace(/\n?```\s*$/, '').trim();
}

let abortController = null;

// --- Provider-specific streaming ---

async function streamAnthropic(apiKey, model, messages, signal, onText) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model, max_tokens: 4096, system: ALMIDE_SYSTEM, stream: true,
      messages,
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.type === 'content_block_delta' && evt.delta && evt.delta.text) {
      onText(evt.delta.text);
    }
  });
}

async function streamOpenAI(apiKey, model, messages, signal, onText) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model, max_tokens: 4096, stream: true,
      messages: [
        { role: 'system', content: ALMIDE_SYSTEM },
        ...messages,
      ],
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.choices && evt.choices[0] && evt.choices[0].delta && evt.choices[0].delta.content) {
      onText(evt.choices[0].delta.content);
    }
  });
}

async function streamGemini(apiKey, model, messages, signal, onText) {
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':streamGenerateContent?key=' + apiKey + '&alt=sse';
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }],
  }));
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: ALMIDE_SYSTEM }] },
      contents,
    }),
    signal,
  });
  if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + (await resp.text()));
  await readSSE(resp, (evt) => {
    if (evt.candidates && evt.candidates[0] && evt.candidates[0].content) {
      const parts = evt.candidates[0].content.parts;
      if (parts) for (const p of parts) { if (p.text) onText(p.text); }
    }
  });
}

async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try { onEvent(JSON.parse(data)); } catch(e) { /* skip */ }
    }
  }
}

const MAX_REPAIR_ATTEMPTS = 3;

function tryCompileAndRun(source) {
  let js;
  try {
    js = compile_to_js(source);
  } catch(e) {
    return { ok: false, error: String(e), phase: 'compile' };
  }
  try {
    const output = captureOutput(js);
    return { ok: true, js, output };
  } catch(e) {
    return { ok: false, error: String(e), js, phase: 'runtime' };
  }
}

window.generateCode = async function() {
  const provider = document.getElementById('ai-provider').value;
  const apiKey = document.getElementById('ai-key').value.trim();
  if (!apiKey) { alert('Please enter your API key'); return; }
  const prompt = document.getElementById('ai-prompt').value.trim();
  if (!prompt) { alert('Please describe what to generate'); return; }
  const model = document.getElementById('ai-model').value;
  const btn = document.getElementById('ai-btn');
  const editor = document.getElementById('editor');
  const statusText = document.getElementById('status-text');

  if (abortController) {
    abortController.abort();
    abortController = null;
    btn.textContent = 'Generate';
    statusText.textContent = 'Cancelled';
    return;
  }

  abortController = new AbortController();
  btn.textContent = 'Stop';
  editor.value = '';
  editor.classList.add('ai-streaming');
  statusText.textContent = 'Generating...';

  const streamFn = { anthropic: streamAnthropic, openai: streamOpenAI, gemini: streamGemini }[provider];
  const messages = [{ role: 'user', content: prompt }];

  const outputEl = document.getElementById('output');
  const compiledEl = document.getElementById('compiled');
  let repairLog = [];

  function renderLog() {
    outputEl.className = 'output-area';
    outputEl.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'repair-log';
    for (const entry of repairLog) {
      const step = document.createElement('div');
      step.className = 'log-step ' + entry.cls;
      const label = document.createElement('div');
      label.className = 'log-label';
      label.textContent = entry.label;
      step.appendChild(label);
      if (entry.detail) {
        const detail = document.createElement('div');
        detail.className = 'log-detail';
        detail.textContent = entry.detail;
        step.appendChild(detail);
      }
      container.appendChild(step);
    }
    outputEl.appendChild(container);
    outputEl.scrollTop = outputEl.scrollHeight;
    showTab('output');
  }

  try {
    await streamFn(apiKey, model, messages, abortController.signal, (text) => {
      editor.value += text;
      editor.scrollTop = editor.scrollHeight;
      syncHighlight();
    });
    editor.value = stripCodeFences(editor.value);
    syncHighlight();

    if (!wasmReady) {
      statusText.textContent = 'Generated (Wasm not loaded)';
      return;
    }

    let code = editor.value;
    let result = tryCompileAndRun(code);
    let totalFixes = 0;

    if (result.ok) {
      repairLog.push({ cls: 'log-ok', label: 'Compile & run OK' });
    } else {
      const phase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
      repairLog.push({ cls: 'log-error', label: phase + ' detected', detail: result.error });
    }
    renderLog();

    while (!result.ok && totalFixes < MAX_REPAIR_ATTEMPTS) {
      totalFixes++;
      const phase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
      statusText.textContent = 'Repairing (' + totalFixes + '/' + MAX_REPAIR_ATTEMPTS + ')...';

      repairLog.push({ cls: 'log-fix', label: 'Repair ' + totalFixes + '/' + MAX_REPAIR_ATTEMPTS + ' \u2014 fixing ' + phase.toLowerCase() });
      renderLog();

      messages.push({ role: 'assistant', content: code });
      messages.push({ role: 'user', content:
        phase + ':\n' + result.error + '\n\nFix the code and output ONLY the corrected .almd source. No explanations.'
      });

      editor.value = '';
      await streamFn(apiKey, model, messages, abortController.signal, (text) => {
        editor.value += text;
        editor.scrollTop = editor.scrollHeight;
        syncHighlight();
      });
      editor.value = stripCodeFences(editor.value);
      syncHighlight();
      code = editor.value;

      result = tryCompileAndRun(code);

      if (result.ok) {
        repairLog.push({ cls: 'log-ok', label: 'Fixed \u2014 compile & run OK' });
      } else {
        const newPhase = result.phase === 'runtime' ? 'Runtime error' : 'Compile error';
        const prevError = repairLog.filter(e => e.cls === 'log-error').pop();
        const same = prevError && result.error === prevError.detail;
        repairLog.push({
          cls: 'log-error',
          label: same ? 'Same error persists' : 'New ' + newPhase.toLowerCase(),
          detail: result.error,
        });
      }
      renderLog();
    }

    if (result.ok) {
      compiledEl.textContent = result.js;
      compiledEl.className = 'output-area';
      if (result.output) {
        repairLog.push({ cls: 'log-ok', label: 'Output', detail: result.output });
        renderLog();
      }
      statusText.textContent = totalFixes > 0
        ? 'Repaired (' + totalFixes + ') & running'
        : 'Running';
    } else {
      repairLog.push({ cls: 'log-fail', label: 'Failed after ' + MAX_REPAIR_ATTEMPTS + ' attempts', detail: result.error });
      renderLog();
      statusText.textContent = 'Failed';
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      statusText.textContent = 'Error: ' + e.message;
    }
  } finally {
    abortController = null;
    btn.textContent = 'Generate';
    editor.classList.remove('ai-streaming');
  }
};

// --- Compiler / Runner ---

function stripRuntimeAndEntry(js) {
  let code = js;
  const endRuntime = code.indexOf('// ---- End Runtime ----');
  if (endRuntime !== -1) code = code.substring(endRuntime + '// ---- End Runtime ----'.length);
  const entryPoint = code.indexOf('// ---- Entry Point ----');
  if (entryPoint !== -1) code = code.substring(0, entryPoint);
  return code;
}

function captureOutput(js) {
  const lines = [];
  const fakePrintln = (s) => lines.push(String(s));
  const userCode = stripRuntimeAndEntry(js);
  const wrappedCode = [
    'const println = __println__;',
    'const eprintln = __println__;',
    'const __fs = { exists(p){throw new Error("fs not available in browser")}, read_text(p){throw new Error("fs not available in browser")}, read_bytes(p){throw new Error("fs not available in browser")}, write(p,s){throw new Error("fs not available in browser")}, write_bytes(p,b){throw new Error("fs not available in browser")}, append(p,s){throw new Error("fs not available in browser")}, mkdir_p(p){throw new Error("fs not available in browser")}, exists_q(p){throw new Error("fs not available in browser")} };',
    'const __string = { trim(s){return s.trim()}, split(s,sep){return s.split(sep)}, join(arr,sep){return arr.join(sep)}, len(s){return s.length}, pad_left(s,n,ch){return s.padStart(n,ch)}, starts_with(s,prefix){return s.startsWith(prefix)}, slice(s,start,end){return end!==undefined?s.slice(start,end):s.slice(start)}, to_bytes(s){return Array.from(new TextEncoder().encode(s))}, contains(s,sub){return s.includes(sub)}, starts_with_q(s,prefix){return s.startsWith(prefix)}, ends_with_q(s,suffix){return s.endsWith(suffix)}, to_upper(s){return s.toUpperCase()}, to_lower(s){return s.toLowerCase()}, to_int(s){const n=parseInt(s,10);if(isNaN(n))throw new Error("invalid integer: "+s);return n}, replace(s,from,to){return s.split(from).join(to)}, char_at(s,i){return i<s.length?s[i]:null} };',
    'const __list = { len(xs){return xs.length}, get(xs,i){return i<xs.length?xs[i]:null}, sort(xs){return[...xs].sort()}, contains(xs,x){return xs.includes(x)}, each(xs,f){xs.forEach(f)}, map(xs,f){return xs.map(f)}, filter(xs,f){return xs.filter(f)}, find(xs,f){return xs.find(f)??null}, fold(xs,init,f){return xs.reduce(f,init)} };',
    'const __int = { to_hex(n){return(typeof n==="bigint"?(n>=0n?n:n+(1n<<64n)).toString(16):n.toString(16))}, to_string(n){return String(n)} };',
    'const __env = { unix_timestamp(){return Math.floor(Date.now()/1000)}, args(){return[]} };',
    'function __bigop(op,a,b){if(typeof a==="bigint"||typeof b==="bigint"){const ba=typeof a==="bigint"?a:BigInt(a);const bb=typeof b==="bigint"?b:BigInt(b);switch(op){case"^":return ba^bb;case"*":return ba*bb;case"%":return ba%bb;case"+":return ba+bb;case"-":return ba-bb;default:return ba}}switch(op){case"^":return a^b;case"*":return a*b;case"%":return a%b;case"+":return a+b;case"-":return a-b;default:return a}}',
    'function __deep_eq(a,b){if(a===b)return true;if(Array.isArray(a)&&Array.isArray(b)){if(a.length!==b.length)return false;for(let i=0;i<a.length;i++){if(!__deep_eq(a[i],b[i]))return false}return true}if(a&&b&&typeof a==="object"&&typeof b==="object"){const ka=Object.keys(a),kb=Object.keys(b);if(ka.length!==kb.length)return false;for(const k of ka){if(!__deep_eq(a[k],b[k]))return false}return true}return false}',
    'function assert_eq(a,b){if(!__deep_eq(a,b))throw new Error("assert_eq: "+JSON.stringify(a)+" !== "+JSON.stringify(b))}',
    'function assert_ne(a,b){if(a===b)throw new Error("assert_ne: "+a+" === "+b)}',
    'function assert(c){if(!c)throw new Error("assertion failed")}',
    'function unwrap_or(x,d){return x!==null?x:d}',
    'function __concat(a,b){return typeof a==="string"?a+b:[...a,...b]}',
    'function __assert_throws(fn,expectedMsg){try{fn();throw new Error("Expected error")}catch(e){if(e instanceof Error&&e.message===expectedMsg)return;throw e}}',
    userCode,
    'if (typeof main === "function") { main(["playground"]); }',
  ].join('\n');
  try {
    const fn = new Function('__println__', wrappedCode);
    fn(fakePrintln);
  } catch(e) {
    lines.push('[Runtime Error] ' + e.message);
  }
  return lines.join('\n');
}

window.compileCode = function() {
  if (!wasmReady) { alert('Wasm not loaded yet'); return; }
  const source = document.getElementById('editor').value;
  const start = performance.now();
  try {
    const js = compile_to_js(source);
    const elapsed = (performance.now() - start).toFixed(1);
    document.getElementById('compiled').textContent = js;
    document.getElementById('compiled').className = 'output-area';
    showTab('compiled');
    document.getElementById('status-text').textContent = 'Compiled in ' + elapsed + 'ms';
  } catch(e) {
    document.getElementById('compiled').textContent = String(e);
    document.getElementById('compiled').className = 'output-area error';
    showTab('compiled');
    document.getElementById('status-text').textContent = 'Compilation failed';
  }
};

window.runCode = function() {
  if (!wasmReady) { alert('Wasm not loaded yet'); return; }
  const source = document.getElementById('editor').value;
  const start = performance.now();
  try {
    const js = compile_to_js(source);
    document.getElementById('compiled').textContent = js;
    document.getElementById('compiled').className = 'output-area';
    const output = captureOutput(js);
    const elapsed = (performance.now() - start).toFixed(1);
    document.getElementById('output').textContent = output || '(no output)';
    document.getElementById('output').className = 'output-area success';
    showTab('output');
    document.getElementById('status-text').textContent = 'Ran in ' + elapsed + 'ms';
  } catch(e) {
    document.getElementById('output').textContent = String(e);
    document.getElementById('output').className = 'output-area error';
    showTab('output');
    document.getElementById('status-text').textContent = 'Error';
  }
};

window.showTab = function(name) {
  ['output', 'compiled', 'ast'].forEach(t => {
    document.getElementById(t).style.display = t === name ? 'block' : 'none';
    document.getElementById('tab-' + t).className = t === name ? 'tab active' : 'tab';
  });
  if (name === 'ast' && wasmReady) {
    const source = document.getElementById('editor').value;
    try {
      const ast = parse_to_ast(source);
      document.getElementById('ast').textContent = ast;
      document.getElementById('ast').className = 'output-area';
    } catch(e) {
      document.getElementById('ast').textContent = String(e);
      document.getElementById('ast').className = 'output-area error';
    }
  }
};

// --- Syntax Highlighting ---

let shikiHighlighter = null;

const HL_KEYWORDS = new Set([
  'module','import','type','fn','let','var','if','then','else','match',
  'effect','do','guard','ok','err','some','none','try','strict','pub',
  'deriving','test','async','await','newtype','for','in','trait','impl','unsafe',
  'and','or','not',
]);
const HL_BOOLS = new Set(['true','false']);
const HL_BUILTINS = new Set(['println','eprintln','assert','assert_eq','assert_ne','unwrap_or']);
const HL_MODULES = new Set(['string','list','int','env','fs']);

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightFallback(code) {
  let out = '', i = 0;
  const len = code.length;
  while (i < len) {
    if (code[i] === '/' && code[i+1] === '/') {
      let end = code.indexOf('\n', i); if (end === -1) end = len;
      out += '<span style="color:#444450;font-style:italic">' + escapeHtml(code.slice(i, end)) + '</span>';
      i = end; continue;
    }
    if (code[i] === '"') {
      let j = i + 1, s = '"';
      while (j < len && code[j] !== '"') {
        if (code[j] === '\\' && j+1 < len) { s += code[j] + code[j+1]; j += 2; }
        else { s += code[j]; j++; }
      }
      if (j < len) { s += '"'; j++; }
      out += '<span style="color:#5e8a6e">' + escapeHtml(s) + '</span>';
      i = j; continue;
    }
    if (code[i] >= '0' && code[i] <= '9') {
      let j = i;
      while (j < len && ((code[j] >= '0' && code[j] <= '9') || code[j] === '.')) j++;
      out += '<span style="color:#b07d5e">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if (code[i] >= 'A' && code[i] <= 'Z') {
      let j = i;
      while (j < len && /[a-zA-Z0-9_]/.test(code[j])) j++;
      out += '<span style="color:#8a8a95">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j; continue;
    }
    if ((code[i] >= 'a' && code[i] <= 'z') || code[i] === '_') {
      let j = i;
      while (j < len && /[a-zA-Z0-9_]/.test(code[j])) j++;
      if (j < len && code[j] === '?') j++;
      const w = code.slice(i, j);
      if (HL_KEYWORDS.has(w)) out += '<span style="color:#8b1a2b;font-weight:500">' + escapeHtml(w) + '</span>';
      else if (HL_BOOLS.has(w)) out += '<span style="color:#b07d5e">' + escapeHtml(w) + '</span>';
      else if (HL_BUILTINS.has(w) || HL_MODULES.has(w)) out += '<span style="color:#6e6e7a">' + escapeHtml(w) + '</span>';
      else {
        let k = j; while (k < len && code[k] === ' ') k++;
        if (code[k] === '(') out += '<span style="color:#c0bfba">' + escapeHtml(w) + '</span>';
        else out += '<span style="color:#9a9a9a">' + escapeHtml(w) + '</span>';
      }
      i = j; continue;
    }
    if (i+1 < len) {
      const two = code[i] + code[i+1];
      if (['->','=>','|>','==','!=','<=','>=','++'].includes(two)) {
        out += '<span style="color:#555560">' + escapeHtml(two) + '</span>';
        i += 2; continue;
      }
    }
    out += '<span style="color:#555560">' + escapeHtml(code[i]) + '</span>'; i++;
  }
  if (!code.endsWith('\n')) out += '\n';
  return out;
}

async function initShiki() {
  try {
    const { createHighlighterCore } = await import('https://esm.sh/shiki@3.2.1/core');
    const { createJavaScriptRegexEngine } = await import('https://esm.sh/shiki@3.2.1/engine/javascript');
    const grammarResp = await fetch('./almide.tmLanguage.json');
    const grammar = await grammarResp.json();
    grammar.name = 'almide';
    shikiHighlighter = await createHighlighterCore({
      themes: [import('https://esm.sh/shiki@3.2.1/themes/tokyo-night.mjs')],
      langs: [grammar],
      engine: createJavaScriptRegexEngine(),
    });
    syncHighlight();
  } catch(e) {
    console.warn('Shiki init failed, using fallback:', e);
  }
}

function syncHighlight() {
  const editor = document.getElementById('editor');
  const hl = document.getElementById('highlight');
  const code = editor.value;
  if (shikiHighlighter) {
    try {
      const html = shikiHighlighter.codeToHtml(code || ' ', { lang: 'almide', theme: 'tokyo-night' });
      const match = html.match(/<pre[^>]*><code[^>]*>([\s\S]*)<\/code><\/pre>/);
      hl.innerHTML = match ? match[1] : highlightFallback(code);
    } catch(e) {
      hl.innerHTML = highlightFallback(code);
    }
  } else {
    hl.innerHTML = highlightFallback(code);
  }
}

function syncScroll() {
  const editor = document.getElementById('editor');
  const hl = document.getElementById('highlight');
  hl.scrollTop = editor.scrollTop;
  hl.scrollLeft = editor.scrollLeft;
}

const editor = document.getElementById('editor');
editor.addEventListener('input', syncHighlight);
editor.addEventListener('scroll', syncScroll);
syncHighlight();

initShiki();
boot();
